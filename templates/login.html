<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Hub Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('landing') }}">Coffee Social Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('brew') }}">Brew Map</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('social') }}">Social Grounds</a></li>
                    <li class="nav-item"><a class="btn btn-nav" href="{{ url_for('login') }}">Login / Sign Up</a></li>
                </ul>
            </div>
        </div>
    </nav>

<div class="login-container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h2 class="logo">Coffee Hub</h2>
        <h3>Welcome Back</h3>
        <p class="subtitle">Find your perfect coffee spot</p>

        <div class="tabs">
            <a class="active" href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('signup') }}">Signup</a>
        </div>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        {% if message %}
        <p class="success">{{ message }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <button type="submit" class="login-btn">Login</button>
        </form>


    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <img src="{{ url_for('static', filename='images/login-image.jpeg') }}" alt="coffee">
    </div>

</div>
<footer>
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
        <span class="footer-brand">Coffee Social Hub</span>
        <span class="footer-note">CITS5505 Group Project · UWA 2026</span>
    </div>
</footer>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if (window.location.search.includes("error")) {
        window.history.replaceState({}, document.title, "/login");
    }
</script>
</html>
